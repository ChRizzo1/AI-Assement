<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>AI Adoption — Assessment</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <h1>AI Adoption — Quick Assessment</h1>
      <form id="assessment-form">
        <label>Organization size:
          <select name="size">
            <option value="small">Small</option>
            <option value="medium">Medium</option>
            <option value="large">Large</option>
          </select>
        </label>

        <label>Data readiness (1-5):
          <input type="number" name="data_readiness" min="1" max="5" value="3" />
        </label>

        <label>Has governance processes?
          <select name="governance">
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </label>

        <button type="submit">Run Assessment</button>
      </form>

      <section id="result"></section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
